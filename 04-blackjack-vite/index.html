<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/02-Blackjack/assets/css/styles.css">

</head>
<body>

    <header class="titulo">
        <h1>Blackjack</h1>
    </header>
    
    <div class="row mt-2">

        <div id='divBotones' class="col text-center">
            
            <button id="btnNuevo" class="btn btn-danger">Nuevo Juego</button>
            <button id="btnPedir" disabled="disabled" class="btn btn-primary">Pedir Carta</button>
            <button id="btnDetener" disabled="disabled"class="btn btn-primary">Detener</button>

        </div>
    </div>

    <div class="row container">
        <div class="col">

            <h1> Jugador 1 - <small id="puntos-jugador">Puntos: 0</small></h1>
            <div id="jugador-cartas" class="divCartas">
                <!-- Aqui se insertan dinamicamente las cartas -->
            </div>

        </div>
    </div>


    <div class="row container mt-2">
        <div class="col">

            <h1> Computadora - <small id="puntos-computadora">Puntos: 0</small></h1>
            <div id="computadora-cartas" class="divCartas">
                <!-- Aqui se insertan dinamicamente las cartas -->
            </div> 

        </div>
    </div>

    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>

</body>
</html>
