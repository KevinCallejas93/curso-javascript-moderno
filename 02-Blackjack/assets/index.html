<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">

</head>
<body>

    <header class="titulo">
        <h1>Blackjack</h1>
    </header>
    
    <div class="row mt-2">
        <div class="col text-center">
            
            <button class="btn-danger">Nuevo Juego</button>
            <button class="btn-primary">Pedir Carta</button>
            <button class="btn-primary">Detener</button>

        </div>
    </div>

    <div class="row container">
        <div class="col">

            <h1> Jugador 1 - <small>Puntos: 0</small></h1>
            <div id="jugador-cartas">
                <img class="carta" src="/02-Blackjack/assets/cartas/2C.png" alt="">
            </div>

        </div>
    </div>


    <div class="row container mt-2">
        <div class="col">

            <h1> Computadora - <small>Puntos: 0</small></h1>
            <div id="computadora-cartas">
                <img class="carta" src="/02-Blackjack/assets/cartas/3C.png" alt="">
            </div> 

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/underscore@1.13.8/underscore-umd-min.js"></script>
    <script src="js/juego.js"></script>


</body>
</html>
